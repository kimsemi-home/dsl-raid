# generated by scripts/gitlabgen.sh; do not edit by hand
default:
  image: rust:latest
  before_script:
    - apt-get update
    - apt-get install -y golang-go nodejs npm sbcl

stages:
  - lint
  - unit-test
  - integration-test
  - conformance
  - release-check

lint:
  stage: lint
  script:
    - |
      go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
    - |
      actionlint_bin="$(go env GOPATH)/bin/actionlint" && "$actionlint_bin"
    - |
      bash scripts/check-source-lines.sh
    - |
      bash scripts/go-lint.sh
    - |
      cargo fmt --all -- --check
    - |
      cargo clippy --workspace --all-targets -- -D warnings

unit-test:
  stage: unit-test
  needs:
    - lint
  script:
    - |
      cargo test --workspace

integration-test:
  stage: integration-test
  needs:
    - unit-test
  script:
    - |
      npm --prefix apps/viewer ci
    - |
      npm --prefix apps/viewer test
    - |
      npm --prefix apps/viewer run build

conformance:
  stage: conformance
  needs:
    - integration-test
  script:
    - |
      cargo run -p dslraid-cli -- quality

release-check:
  stage: release-check
  needs:
    - conformance
  script:
    - |
      bash scripts/workflowgen.sh check
    - |
      bash scripts/gitlabgen.sh check
