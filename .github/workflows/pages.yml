# generated by scripts/pagesworkflowgen.sh; do not edit by hand
name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy viewer demos
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/viewer/package-lock.json
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true
      - name: Render example assets
        run: |
          cargo run -p dslraid-cli -- demo package \
            examples/runscope/runscope.raid.json \
            --out apps/viewer/public/examples \
            --trace examples/runscope/run-001.trace.json
      - name: Build viewer
        working-directory: apps/viewer
        run: |
          npm ci
          npm run build
      - name: Build Flutter viewer pilot
        working-directory: apps/viewer_flutter
        run: flutter build web --base-href /dsl-raid/flutter/
      - name: Add Flutter viewer to Pages artifact
        working-directory: apps/viewer_flutter
        run: |
          mkdir -p ../viewer/dist/flutter
          cp -R build/web/. ../viewer/dist/flutter/
      - uses: actions/upload-pages-artifact@v5
        with:
          path: apps/viewer/dist
      - uses: actions/deploy-pages@v5
