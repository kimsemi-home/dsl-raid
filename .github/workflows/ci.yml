name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Lint GitHub Actions workflows
        run: |
          actionlint_bin="$(go env GOPATH)/bin/actionlint"
          "$actionlint_bin"

  schemas:
    name: Schemas and fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate JSON syntax
        run: |
          set -euo pipefail
          find schemas examples -name '*.json' -print0 |
            while IFS= read -r -d '' file; do
              python3 -m json.tool "$file" >/dev/null
            done

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Detect Rust workspace
        id: rust
        run: |
          if [ -f Cargo.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: dtolnay/rust-toolchain@stable
        if: steps.rust.outputs.present == 'true'
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        if: steps.rust.outputs.present == 'true'

      - name: Check formatting
        if: steps.rust.outputs.present == 'true'
        run: cargo fmt --all -- --check

      - name: Clippy
        if: steps.rust.outputs.present == 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        if: steps.rust.outputs.present == 'true'
        run: cargo test --workspace

      - name: Skip Rust
        if: steps.rust.outputs.present != 'true'
        run: echo "No Cargo.toml yet; skipping Rust checks."

  go:
    name: Go lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
          cache-dependency-path: generated/go.mod

      - name: Run golangci-lint
        env:
          GOLANGCI_LINT_VERSION: v2.12.2
        run: scripts/go-lint.sh

  source-shape:
    name: Source shape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Enforce source line budget
        run: bash scripts/check-source-lines.sh

      - name: Check generated roadmap index
        run: bash scripts/roadmapgen.sh check

      - name: Check generated docs index
        run: bash scripts/gendocindex.sh check

  lisp:
    name: Lisp authoring
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify Lisp checks are owned by quality
        run: |
          set -euo pipefail
          owner=crates/dslraid-cli/src/commands/quality/lisp/scripts.rs
          grep -q 'scripts/lisp-test.sh' "$owner"
          grep -q 'scripts/lisp-docgen.sh' "$owner"
          grep -q 'scripts/langdiaggen.sh' "$owner"
          grep -q 'scripts/backendgen.sh' "$owner"
          grep -q 'scripts/workflowgen.sh' "$owner"
          grep -q 'scripts/gitlabgen.sh' "$owner"
          grep -q 'scripts/makegen.sh' "$owner"
          grep -q 'scripts/bazelgen.sh' "$owner"
          grep -q 'scripts/releasegen.sh' "$owner"
          grep -q 'scripts/privacycheck.sh' "$owner"
          grep -q 'scripts/verificationprivacygen.sh' "$owner"
          grep -q 'scripts/verificationpdcagen.sh' "$owner"
          grep -q 'scripts/verificationevidenceopsgen.sh' "$owner"
          grep -q 'scripts/verificationlossgen.sh' "$owner"
          grep -q 'scripts/verificationsemanticgen.sh' "$owner"
          grep -q 'scripts/verificationdiffgen.sh' "$owner"
          grep -q 'scripts/verificationauthoritygen.sh' "$owner"
          grep -q 'scripts/verificationaccessgen.sh' "$owner"
          grep -q 'scripts/verificationreasoninggen.sh' "$owner"
          grep -q 'scripts/verificationreliabilitygen.sh' "$owner"
          grep -q 'scripts/verificationagreementgen.sh' "$owner"
          grep -q 'scripts/verificationevidencequalitygen.sh' "$owner"
          grep -q 'scripts/verificationleasegen.sh' "$owner"
          grep -q 'scripts/verificationreviewgen.sh' "$owner"
          grep -q 'scripts/verificationfeedbackgen.sh' "$owner"
          grep -q 'scripts/verificationquarantinegen.sh' "$owner"
          grep -q 'scripts/verificationconfidencegen.sh' "$owner"
          grep -q 'scripts/verificationsidecargen.sh' "$owner"
          grep -q 'scripts/verificationorchestrationgen.sh' "$owner"
          grep -q 'scripts/verificationcontrolgen.sh' "$owner"
          grep -q 'scripts/verificationprovidergen.sh' "$owner"
          grep -q 'scripts/verificationruntimegen.sh' "$owner"
          grep -q 'scripts/verificationadrgen.sh' "$owner"
          grep -q 'scripts/verificationparitygen.sh' "$owner"
          grep -q 'scripts/verificationactionsgen.sh' "$owner"
          grep -q 'scripts/verificationreleaseprovenancegen.sh' "$owner"
          grep -q 'scripts/verificationincidentgen.sh' "$owner"
          grep -q 'scripts/verificationgenesisgen.sh' "$owner"
          grep -q 'scripts/verificationmetamodelgen.sh' "$owner"
          grep -q 'scripts/verificationstewardgen.sh' "$owner"
          grep -q 'scripts/verificationrevalidationgen.sh' "$owner"
          grep -q 'scripts/verificationcoldstartgen.sh' "$owner"
          grep -q 'scripts/verificationseparationgen.sh' "$owner"
          grep -q 'scripts/verificationevidencebeforechangegen.sh' "$owner"
          grep -q 'scripts/verificationversionedssotgen.sh' "$owner"
          grep -q 'scripts/verificationcontextmapgen.sh' "$owner"
          grep -q 'scripts/verificationhistoricalgen.sh' "$owner"
          grep -q 'scripts/verificationtransitiongen.sh' "$owner"
          grep -q 'scripts/verificationssotdefectgen.sh' "$owner"
          grep -q 'scripts/verificationrootcausegen.sh' "$owner"
          grep -q 'scripts/verificationdebuggergen.sh' "$owner"
          grep -q 'scripts/verificationpruninggen.sh' "$owner"
          grep -q 'scripts/verificationsecuritygen.sh' "$owner"
          grep -q 'scripts/verificationfailuregen.sh' "$owner"
          grep -q 'scripts/verificationdebtgen.sh' "$owner"
          grep -q 'scripts/verificationcodegengen.sh' "$owner"
          grep -q 'scripts/verificationontologygen.sh' "$owner"
          grep -q 'scripts/verificationconformancegen.sh' "$owner"
          grep -q 'scripts/verificationschemagen.sh' "$owner"
          grep -q 'scripts/verificationmanifestschemagen.sh' "$owner"
          grep -q 'scripts/verificationtestgen.sh' "$owner"
          grep -q 'scripts/verificationevidencegen.sh' "$owner"
          grep -q 'scripts/lisp-irgen.sh' crates/dslraid-cli/src/commands/quality/lisp.rs
          grep -q 'scripts/lisp-rustgen.sh' crates/dslraid-cli/src/commands/quality/lisp.rs
          grep -q 'scripts/verificationdocgen.sh' \
            crates/dslraid-cli/src/commands/quality/docs/scripts.rs
          echo "lisp authoring checks are covered by dslraid quality"

  dslraid:
    name: DSLRaid quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Detect DSLRaid CLI
        id: cli
        run: |
          if [ -f Cargo.toml ] && [ -f crates/dslraid-cli/Cargo.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install SBCL
        if: steps.cli.outputs.present == 'true'
        timeout-minutes: 20
        run: bash scripts/install-sbcl.sh

      - uses: dtolnay/rust-toolchain@stable
        if: steps.cli.outputs.present == 'true'

      - uses: Swatinem/rust-cache@v2
        if: steps.cli.outputs.present == 'true'

      - name: Run unified quality gate
        if: steps.cli.outputs.present == 'true'
        run: cargo run -p dslraid-cli -- quality

      - name: Bootstrap quality fallback
        if: steps.cli.outputs.present != 'true'
        run: |
          find schemas examples -name '*.json' -print0 |
            while IFS= read -r -d '' file; do
              python3 -m json.tool "$file" >/dev/null
            done

  viewer:
    name: Viewer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Detect viewer app
        id: viewer
        run: |
          if [ -f apps/viewer/package-lock.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v6
        if: steps.viewer.outputs.present == 'true'
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/viewer/package-lock.json

      - name: Install viewer dependencies
        if: steps.viewer.outputs.present == 'true'
        working-directory: apps/viewer
        run: npm ci

      - name: Lint viewer
        if: steps.viewer.outputs.present == 'true'
        working-directory: apps/viewer
        run: npm run lint

      - name: Test viewer
        if: steps.viewer.outputs.present == 'true'
        working-directory: apps/viewer
        run: npm test

      - name: Build viewer
        if: steps.viewer.outputs.present == 'true'
        working-directory: apps/viewer
        run: npm run build

      - name: Skip viewer
        if: steps.viewer.outputs.present != 'true'
        run: echo "No apps/viewer/package-lock.json yet; skipping viewer checks."
