# generated by scripts/cigen.sh; do not edit by hand
name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Lint GitHub Actions workflows
        run: |
          actionlint_bin="$(go env GOPATH)/bin/actionlint"
          "$actionlint_bin"

  schemas:
    name: Schemas and fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate JSON syntax
        run: |
          set -euo pipefail
          find schemas examples -name '*.json' -print0 |
            while IFS= read -r -d '' file; do
              python3 -m json.tool "$file" >/dev/null
            done

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  go:
    name: Go lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
          cache-dependency-path: generated/go.mod
      - name: Run golangci-lint
        env:
          GOLANGCI_LINT_VERSION: v2.12.2
        run: scripts/go-lint.sh

  source-shape:
    name: Source shape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Enforce source line budget
        run: bash scripts/check-source-lines.sh
      - name: Check generated roadmap index
        run: bash scripts/roadmapgen.sh check
      - name: Check generated docs index
        run: bash scripts/gendocindex.sh check

  lisp:
    name: Lisp authoring
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install SBCL
        run: bash scripts/install-sbcl.sh
      - name: Verify quality owns generated backends
        run: bash scripts/verificationqualitygen.sh check

  dslraid:
    name: DSLRaid quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install SBCL
        timeout-minutes: 20
        run: bash scripts/install-sbcl.sh
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run unified quality gate
        run: cargo run -p dslraid-cli -- quality

  viewer:
    name: Viewer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/viewer/package-lock.json
      - name: Install viewer dependencies
        working-directory: apps/viewer
        run: npm ci
      - name: Lint viewer
        working-directory: apps/viewer
        run: npm run lint
      - name: Test viewer
        working-directory: apps/viewer
        run: npm test
      - name: Build viewer
        working-directory: apps/viewer
        run: npm run build
