# generated by scripts/releasegen.sh; do not edit by hand
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Detect Rust workspace
        id: rust
        run: |
          if [ -f Cargo.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: dtolnay/rust-toolchain@stable
        if: steps.rust.outputs.present == 'true'
      - uses: Swatinem/rust-cache@v2
        if: steps.rust.outputs.present == 'true'
      - name: Install SBCL
        run: bash scripts/install-sbcl.sh
      - name: Test release build
        if: steps.rust.outputs.present == 'true'
        run: cargo test --workspace
      - name: Check generated release workflow
        run: bash scripts/releasegen.sh check
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
