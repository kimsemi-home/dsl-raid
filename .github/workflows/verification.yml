# generated by scripts/workflowgen.sh; do not edit by hand
name: Verification Graph

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run lint command 1
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
      - name: Run lint command 2
        run: actionlint_bin="$(go env GOPATH)/bin/actionlint" && "$actionlint_bin"
      - name: Run lint command 3
        run: bash scripts/check-source-lines.sh
      - name: Run lint command 4
        run: bash scripts/go-lint.sh
      - name: Run lint command 5
        run: cargo fmt --all -- --check
      - name: Run lint command 6
        run: cargo clippy --workspace --all-targets -- -D warnings

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run unit-test command 1
        run: cargo test --workspace

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/viewer/package-lock.json
      - name: Run integration-test command 1
        run: npm --prefix apps/viewer ci
      - name: Run integration-test command 2
        run: npm --prefix apps/viewer test
      - name: Run integration-test command 3
        run: npm --prefix apps/viewer run build

  conformance:
    name: Conformance
    runs-on: ubuntu-latest
    needs: [integration-test]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install SBCL
        run: bash scripts/install-sbcl.sh
      - name: Run conformance command 1
        run: cargo run -p dslraid-cli -- quality

  release-check:
    name: Release Check
    runs-on: ubuntu-latest
    needs: [conformance]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install SBCL
        run: bash scripts/install-sbcl.sh
      - name: Check release-check provider scripts
        run: bash scripts/releasecheckgen.sh check
      - name: Run release-check provider core
        run: bash scripts/releasecheck/core.sh
      - name: Run release-check provider governance
        run: bash scripts/releasecheck/governance.sh
      - name: Run release-check provider runtime
        run: bash scripts/releasecheck/runtime.sh
      - name: Run release-check provider ssot
        run: bash scripts/releasecheck/ssot.sh
      - name: Run release-check provider artifacts
        run: bash scripts/releasecheck/artifacts.sh
