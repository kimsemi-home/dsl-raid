repos:
  - repo: local
    hooks:
      - id: document-code-coupling
        name: document-code-coupling
        entry: go run ./cmd/repoctl trace staged
        language: system
        pass_filenames: false
        always_run: true
      - id: golangci-lint
        name: golangci-lint
        entry: scripts/go-lint.sh
        language: system
        pass_filenames: false
        always_run: true
